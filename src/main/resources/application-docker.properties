# -------------------------------------------------------
# Perfil Docker: SQL Server corriendo en contenedor local
# Activa este perfil con: SPRING_PROFILES_ACTIVE=docker
# o desde Maven: ./mvnw spring-boot:run -Dspring-boot.run.profiles=docker
# -------------------------------------------------------

# Conexion TCP directa al puerto 1433 (sin instancia nombrada)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=E-commerce;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:YourStrong@Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Rate-limit laxo para desarrollo: suficiente para frenar fuerza bruta,
# pero sin molestar tests manuales, seeds ni corridas de Postman.
rate-limit.auth.capacity=200
rate-limit.general.capacity=2000
