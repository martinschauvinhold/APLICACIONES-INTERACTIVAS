# -------------------------------------------------------
# Perfil por defecto: SQL Server Express (instalacion local)
# Para usar Docker: SPRING_PROFILES_ACTIVE=docker
# Las variables de entorno sobreescriben los valores por defecto.
# -------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=E-commerce;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASS:App12345!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Default solo para desarrollo (≥32 chars para HS256). En prod sobreescribir con la env var JWT_SECRET.
jwt.secret=${JWT_SECRET:dev-only-default-secret-change-in-prod-0123456789}
jwt.expiration-ms=86400000

# Rate limiting (requests por minuto por IP)
rate-limit.auth.capacity=10
rate-limit.general.capacity=100

# Subida de imágenes de productos (multipart). Estos límites aplican a todos los
# perfiles (los application-<perfil>.properties se cargan ADEMÁS de este archivo).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Almacenamiento en disco de las imágenes y cómo se exponen públicamente.
# app.uploads.dir       -> carpeta donde se escriben los archivos
# app.uploads.url-path  -> prefijo del resource handler que las sirve estáticas
# app.uploads.base-url  -> host para construir URLs absolutas usables por el front
app.uploads.dir=${UPLOADS_DIR:uploads/products}
app.uploads.url-path=/uploads/products
app.uploads.base-url=${UPLOADS_BASE_URL:http://localhost:8080}