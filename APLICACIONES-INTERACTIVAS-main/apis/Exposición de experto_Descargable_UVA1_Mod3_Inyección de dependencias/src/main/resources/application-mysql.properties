# -------------------------------------------------------
# Perfil MySQL local (instalacion directa en el host)
# Activa este perfil con: SPRING_PROFILES_ACTIVE=mysql
# -------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASS:App12345!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

rate-limit.auth.capacity=10
rate-limit.general.capacity=100
