# -------------------------------------------------------
# Perfil por defecto: SQL Server Express (instalacion local)
# Para usar Docker: SPRING_PROFILES_ACTIVE=docker
# Las variables de entorno sobreescriben los valores por defecto.
# -------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=E-commerce;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASS:App12345!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true